<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 360px; padding: 12px; font-family: sans-serif; margin: 0; }
  textarea { width: 100%; height: 80px; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
  .result { width: 100%; min-height: 60px; box-sizing: border-box; padding: 8px; border: 1px solid #d0e0ff; border-radius: 4px; background: #f5f8ff; margin-top: 8px; white-space: pre-wrap; font-size: 14px; }
  button { margin-top: 8px; padding: 6px 16px; cursor: pointer; }
  .btn-row { display: flex; gap: 6px; align-items: center; }
  .status { color: #888; font-size: 12px; margin-left: auto; }
</style>
</head>
<body>
  <textarea id="source" placeholder="Enter text to translate..."></textarea>
  <div class="btn-row">
    <button id="translateBtn">Translate</button>
    <span class="status" id="status">Loading...</span>
  </div>
  <div class="result" id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
